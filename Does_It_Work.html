<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<title>Does It Work?</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1c1c1e;
  --card: #242428;
  --border: #2e2e32;
  --text: #f2f2f7;
  --text-2: #aeaeb2;
  --text-3: #636366;
  --working: #30d158;
  --working-bg: rgba(48,209,88,.12);
  --partial: #ffd60a;
  --partial-bg: rgba(255,214,10,.12);
  --broken: #ff453a;
  --broken-bg: rgba(255,69,58,.12);
  --unavail: #636366;
  --unavail-bg: rgba(99,99,102,.12);
  --accent: #0a84ff;
  --radius: 12px;
  --radius-sm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px 0}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.header-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,#003B8E,#006EAF)}
.header-logo img{width:100%;height:100%;object-fit:cover;display:block}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-badge{font-size:11px;padding:2px 8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text-2);margin-left:auto;white-space:nowrap}

/* ── Nav tabs ── */
.nav-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.nav-tab{flex:1;padding:10px 8px;font-size:13px;font-weight:600;text-align:center;color:var(--text-2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.nav-tab[aria-selected=true]{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.15s}
.filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Summary bar ── */
.summary-bar{display:flex;gap:8px;padding:0 16px 10px;flex-wrap:wrap}
.summary-pill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.2px}
.pill-working{background:var(--working-bg);color:var(--working)}
.pill-partial{background:var(--partial-bg);color:var(--partial)}
.pill-broken{background:var(--broken-bg);color:var(--broken)}
.pill-unavail{background:var(--unavail-bg);color:var(--unavail)}

/* ── Main content ── */
.main{padding:8px 16px}

/* ── Building card ── */
.building-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.building-header{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none}
.building-header:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.building-name{font-size:15px;font-weight:600;flex:1}
.building-chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.chip-broken{background:var(--broken-bg);color:var(--broken)}
.chip-partial{background:var(--partial-bg);color:var(--partial)}
.chevron{transition:transform .25s;color:var(--text-3);font-size:12px;flex-shrink:0}
.building-card.open .chevron{transform:rotate(180deg)}
.building-body{display:none;padding:0 12px 12px}
.building-card.open .building-body{display:block}

/* ── Feature row ── */
.feature-row{display:flex;align-items:flex-start;gap:10px;padding:10px 10px;border-radius:var(--radius-sm);margin-bottom:4px;background:var(--card);border:1px solid var(--border);cursor:pointer;text-decoration:none;color:inherit;transition:border-color .15s,background .15s}
.feature-row:hover{border-color:var(--accent);background:#1e1e24}
.feature-row:active{background:#18181e}
.feature-row:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.feature-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center;line-height:1}
.feature-body{flex:1;min-width:0}
.feature-name{font-size:14px;font-weight:600;margin-bottom:2px;line-height:1.3}
.feature-detail{font-size:12px;color:var(--text-2);line-height:1.4;margin-bottom:4px}
.feature-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.2px}
.status-working{background:var(--working-bg);color:var(--working)}
.status-partial{background:var(--partial-bg);color:var(--partial)}
.status-broken{background:var(--broken-bg);color:var(--broken)}
.status-unavailable{background:var(--unavail-bg);color:var(--unavail)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.confidence-tag{font-size:10px;color:var(--text-3);padding:2px 6px;border-radius:10px;border:1px solid var(--border)}
.updated-tag{font-size:10px;color:var(--text-3)}
.report-count{font-size:10px;color:var(--text-3)}
.edit-btn{flex-shrink:0;padding:6px 12px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.edit-btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.feature-chevron{flex-shrink:0;color:var(--text-3);font-size:18px;align-self:center;margin-left:2px;line-height:1}

/* ── Feature type list (By Type view) ── */
.type-section{margin-bottom:24px}
.type-section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px}
.type-section-icon{font-size:18px}
.type-section-title{font-size:16px;font-weight:700}
.type-section-count{font-size:13px;color:var(--text-3);margin-left:auto}

/* ── Bottom sheet modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex;animation:fadeIn .2s}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease-out}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:4px}
.sheet-subtitle{font-size:14px;color:var(--text-2);margin-bottom:20px;line-height:1.4}
.status-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.status-option{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--radius);border:2px solid var(--border);background:var(--card);cursor:pointer;transition:.15s;font-size:12px;font-weight:600;text-align:center}
.status-option:hover{border-color:var(--accent)}
.status-option.selected-working{border-color:var(--working);background:var(--working-bg);color:var(--working)}
.status-option.selected-partial{border-color:var(--partial);background:var(--partial-bg);color:var(--partial)}
.status-option.selected-broken{border-color:var(--broken);background:var(--broken-bg);color:var(--broken)}
.status-option-icon{font-size:24px}
.note-input{width:100%;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;resize:none;margin-bottom:16px;font-family:inherit}
.note-input:focus{outline:none;border-color:var(--accent)}
.note-input::placeholder{color:var(--text-3)}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;transition:.15s;margin-bottom:8px}
.btn-primary:hover{opacity:.9}
.btn-primary:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn-secondary{width:100%;padding:12px;background:var(--card);color:var(--text-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-secondary:hover{background:var(--surface)}

/* ── QR feature page ── */
.qr-page{padding:16px;max-width:480px;margin:0 auto}
.qr-back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:14px;font-weight:600;text-decoration:none;margin-bottom:20px;cursor:pointer;background:none;border:none}
.qr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.qr-feature-icon{font-size:40px;margin-bottom:12px}
.qr-feature-name{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.qr-building-name{font-size:15px;color:var(--text-2);margin-bottom:8px}
.qr-detail{font-size:13px;color:var(--text-2);line-height:1.5;margin-bottom:16px}
.qr-status-large{display:inline-flex;align-items:center;gap:8px;font-size:16px;font-weight:700;padding:10px 16px;border-radius:var(--radius-sm)}
.qr-meta{margin-top:12px;font-size:12px;color:var(--text-3);display:flex;flex-direction:column;gap:3px}
.qr-report-title{font-size:17px;font-weight:700;margin-bottom:14px}
.qr-note-label{font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px;display:block}
.qr-source{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);text-decoration:none;margin-top:8px}
.staff-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(10,132,255,.15);color:var(--accent);margin-top:8px}

/* ── Admin / CSV import page ── */
.admin-page{padding:16px;max-width:640px;margin:0 auto}
.admin-title{font-size:22px;font-weight:800;margin-bottom:4px}
.admin-subtitle{font-size:14px;color:var(--text-2);margin-bottom:24px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.drop-zone.dragover{border-color:var(--accent);background:rgba(10,132,255,.05)}
.drop-zone-icon{font-size:40px;margin-bottom:12px}
.drop-zone-text{font-size:15px;font-weight:600;margin-bottom:4px}
.drop-zone-sub{font-size:13px;color:var(--text-2)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.import-preview{margin-top:20px}
.preview-table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--card);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
tr:last-child td{border-bottom:none}
.import-stats{font-size:13px;color:var(--text-2);margin-bottom:12px}
.import-stats strong{color:var(--text)}
.btn-import{padding:12px 24px;background:var(--working);color:#000;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;margin-right:8px}
.btn-clear{padding:12px 24px;background:var(--card);color:var(--text-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}
.schema-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-top:20px;font-size:12px;font-family:monospace;line-height:1.8;color:var(--text-2)}
.schema-box strong{color:var(--text)}
.success-toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--working);color:#000;font-weight:700;font-size:14px;padding:10px 20px;border-radius:20px;z-index:300;animation:fadeIn .3s;pointer-events:none}

/* ── Empty state ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--text-3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text-2)}
.empty-sub{font-size:13px}

/* ── FAB (admin) ── */
.fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:20px;width:48px;height:48px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:90;transition:.2s;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.fab:hover{background:var(--accent);border-color:var(--accent);color:#fff}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Focus / accessible states ── */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
a{color:var(--accent)}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Feature subpage radio cards ── */
.report-radio-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px}
.report-radio-input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.report-radio-label{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--radius);border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:600;text-align:center;color:var(--text-2);transition:.15s;min-height:72px;justify-content:center}
.report-radio-label:hover{border-color:var(--accent)}
.report-radio-input:checked + .report-lbl-working{border-color:var(--working);background:var(--working-bg);color:var(--working)}
.report-radio-input:checked + .report-lbl-partial{border-color:var(--partial);background:var(--partial-bg);color:var(--partial)}
.report-radio-input:checked + .report-lbl-broken{border-color:var(--broken);background:var(--broken-bg);color:var(--broken)}
.report-radio-input:focus-visible + .report-radio-label{outline:2px solid var(--accent);outline-offset:2px}

/* ── QR Yes/No landing page ── */
.qrs-page{min-height:100vh;display:flex;flex-direction:column;padding:0;background:var(--bg)}
.qrs-header{padding:20px 20px 0;display:flex;align-items:center;gap:10px}
.qrs-back{background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px}
.qrs-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px 16px;text-align:center;max-width:480px;margin:0 auto;width:100%}
.qrs-title{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;line-height:1.1}
.qrs-feature-info{display:flex;align-items:center;gap:8px;font-size:16px;color:var(--text-2);margin-bottom:32px}
.qrs-icon{font-size:22px}
.answer-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:360px;margin-bottom:24px}
.answer-btn{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 16px;border-radius:16px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;font-weight:700;color:var(--text-2);transition:.18s;min-height:100px}
.answer-btn:hover{transform:translateY(-2px)}
.answer-btn .ab-icon{font-size:32px}
.answer-btn.sel-yes{border-color:var(--working);background:var(--working-bg);color:var(--working);animation:scaleIn .2s}
.answer-btn.sel-no{border-color:var(--broken);background:var(--broken-bg);color:var(--broken);animation:scaleIn .2s}
.qrs-note-wrap{width:100%;max-width:360px;margin-bottom:20px;text-align:left}
.qrs-note-label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.qrs-confirm{width:100%;max-width:360px;padding:16px;font-size:17px;font-weight:700;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;margin-bottom:8px}
.qrs-confirm:not(:disabled){background:var(--accent);color:#fff}
.qrs-confirm:disabled{background:var(--surface);border:1px solid var(--border);color:var(--text-3);cursor:not-allowed}
.qrs-footer{border-top:1px solid var(--border);padding:18px 20px calc(18px + env(safe-area-inset-bottom));background:var(--surface);margin-top:auto}
.qrs-footer-loc{font-size:13px;color:var(--text-2);margin-bottom:10px;line-height:1.6}
.qrs-footer-loc strong{color:var(--text);display:block;font-size:14px}
.qrs-choose{color:var(--accent);font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px}
/* Submitted state */
.qrs-submitted{text-align:center;padding:48px 24px}
.qrs-submitted-icon{font-size:64px;margin-bottom:16px;display:block}
.qrs-submitted-title{font-size:24px;font-weight:800;margin-bottom:8px}
.qrs-submitted-sub{font-size:15px;color:var(--text-2);line-height:1.5;margin-bottom:32px}
.qrs-btn-row{display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto}

/* ── QR Code print page ── */
.qrp-page{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);padding:0}
.qrp-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.qrp-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.qrp-card{background:#fff;border-radius:20px;padding:32px;display:inline-flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 8px 40px rgba(0,0,0,.5);max-width:340px;width:100%}
#qr-canvas img,#qr-canvas canvas{border-radius:8px;display:block}
.qrp-label{color:#000;font-size:14px;font-weight:700;text-align:center;line-height:1.4;max-width:240px}
.qrp-sublabel{color:#666;font-size:12px;text-align:center}
.qrp-icon-row{display:flex;align-items:center;gap:8px;font-size:22px}
.qrp-actions{display:flex;gap:12px;margin-top:24px;justify-content:center;flex-wrap:wrap}
.btn-print{padding:12px 24px;background:var(--working);color:#000;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer}
.qrp-url{font-size:11px;color:var(--text-3);margin-top:16px;word-break:break-all;max-width:320px;text-align:center}
@media print{
  .qrs-back,.fab,.qrp-actions,.qrp-header{display:none!important}
  .qrp-body{padding:0}
  body{background:#fff}
  .qrp-card{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
  integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSr7FurulmL7pH0LapudyW/URZrmBcTFbQ=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<div id="app"></div>

<script>
'use strict';

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const TYPES = {
  lift:      { icon: '🛗',  label: 'Lift',             trackable: true },
  ramp:      { icon: '🔼',  label: 'Ramp',             trackable: true },
  toilet:    { icon: '🚻',  label: 'Accessible Toilet',trackable: true },
  door:      { icon: '🚪',  label: 'Door',             trackable: true },
  hearing:   { icon: '🦻',  label: 'Hearing Loop',     trackable: true },
  shower:    { icon: '🚿',  label: 'Accessible Shower',trackable: true },
  wheelchair:{ icon: '♿',  label: 'Wheelchair Space', trackable: true },
  steps:     { icon: '🪜',  label: 'Steps / Barrier',  trackable: false },
  intercom:  { icon: '📞',  label: 'Intercom',         trackable: false },
  keycard:   { icon: '🔑',  label: 'Keycard',          trackable: false },
  tactile:   { icon: '🟡',  label: 'Tactile Paving',   trackable: false },
  parking:   { icon: '🅿️',  label: 'Blue Badge Parking',trackable: true },
};

const STATUS_CFG = {

// FIREBASE
// ─────────────────────────────────────────────
let db = null;
let fbReady = false;           // true once first snapshot received
let cachedReports   = {};      // { featureId: [{status,note,timestamp,source}] }
let cachedOverrides = {};      // { featureId: {status,note,timestamp} }

function initFirebase() {
  let cfg = null;
  try { cfg = JSON.parse(localStorage.getItem(LS_FB_CFG) || 'null'); } catch {}
  if (!cfg || !cfg.projectId) return; // not configured yet

  try {
    const app = firebase.initializeApp(cfg);
    db = firebase.firestore();

    // Real-time listener: reports
    db.collection('reports').onSnapshot(snap => {
      snap.forEach(d => { cachedReports[d.id] = d.data().items || []; });
      // Remove any docs deleted remotely
      const ids = new Set(snap.docs.map(d => d.id));
      for (const k of Object.keys(cachedReports)) {
        if (!ids.has(k)) delete cachedReports[k];
      }
      fbReady = true;
      renderApp();
    }, err => console.error('FB reports error', err));

    // Real-time listener: overrides
    db.collection('overrides').onSnapshot(snap => {
      cachedOverrides = {};
      snap.forEach(d => { cachedOverrides[d.id] = d.data(); });
      renderApp();
    }, err => console.error('FB overrides error', err));

  } catch(e) {
    console.error('Firebase init failed:', e);
    db = null;
  }
}

function saveFirebaseConfig() {
  const raw = document.getElementById('fb-cfg-input')?.value?.trim();
  if (!raw) return;
  try {
    // Accept both the raw JS object Firebase gives you and plain JSON
    const json = raw
      .replace(/\/\/.*/g, '')           // strip // comments
      .replace(/([{,]\s*)(\w+)\s*:/g, '$1"$2":') // quote bare keys
      .replace(/'/g, '"');              // single → double quotes
    const cfg = JSON.parse(json);
    if (!cfg.projectId) throw new Error('Missing projectId');
    localStorage.setItem(LS_FB_CFG, JSON.stringify(cfg));
    // Re-init (reload to get fresh Firebase instance)
    showToast('✅ Firebase config saved — reloading…');
    setTimeout(() => location.reload(), 1200);
  } catch(e) {
    showToast('❌ Invalid config: ' + e.message);
  }
}

}

function saveOverrides(o){ localStorage.setItem(LS_OVERRIDE, JSON.stringify(o)); }
function saveImported(b) { localStorage.setItem(LS_IMPORTED, JSON.stringify(b)); }

// Merge SEED + imported buildings
function getAllBuildings() {
  const imported = loadImported();
  const merged = [...SEED];
  for (const b of imported) {
    const idx = merged.findIndex(x => x.id === b.id);
    if (idx >= 0) {
      // Merge features: add new ones, skip duplicates
      const existingIds = new Set(merged[idx].features.map(f => f.id));
      for (const f of b.features) {
        if (!existingIds.has(f.id)) merged[idx].features.push(f);
      }
    } else {
      merged.push(b);
    }
  }
  return merged;
}

// ─────────────────────────────────────────────
// TRUST / CONFIDENCE ENGINE
// ─────────────────────────────────────────────
const DECAY_LAMBDA = 0.05; // per hour

function computeStatus(featureId, defaultStatus) {
  const overrides = loadOverrides();
  const ov = overrides[featureId];
  if (ov) {
    return {
      status: ov.status,
      confidence: 'staff',
      reportCount: 0,
      updatedAt: ov.timestamp,
      note: ov.note,
      isOverride: true,
    };
  }
  if (defaultStatus === 'unavailable') {
    return { status: 'unavailable', confidence: null, reportCount: 0, updatedAt: null };
  }
  const allReports = loadReports();
  const reps = allReports[featureId] || [];
  if (!reps.length) {
    return { status: defaultStatus || 'working', confidence: null, reportCount: 0, updatedAt: null };
  }
  const now = Date.now();
  const scores = { working: 0, partial: 0, broken: 0 };
  for (const r of reps) {
    const hoursAgo = (now - new Date(r.timestamp).getTime()) / 3600000;
    const weight = Math.exp(-DECAY_LAMBDA * hoursAgo);
    if (scores[r.status] !== undefined) scores[r.status] += weight;
  }
  const total = scores.working + scores.partial + scores.broken;
  const dominant = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const ratio = total > 0 ? scores[dominant] / total : 0;
  const confidence = total < 0.1 ? null : ratio > 0.75 ? 'high' : ratio > 0.5 ? 'medium' : 'low';
  const lastReport = reps[reps.length - 1];
  return {
    status: dominant,
    confidence,
    reportCount: reps.length,
    updatedAt: lastReport.timestamp,
    note: lastReport.note,
    isOverride: false,
  };
}

function addReport(featureId, status, note, source = 'web') {
  const entry = { status, note: note || '', timestamp: new Date().toISOString(), source };
  if (db) {
    const ref = db.collection('reports').doc(featureId);
    ref.get().then(snap => {
      const items = snap.exists ? (snap.data().items || []) : [];
      items.push(entry);
      if (items.length > 50) items.splice(0, items.length - 50);
      ref.set({ items });
      // onSnapshot will update cachedReports and re-render automatically
    }).catch(e => console.error('addReport error', e));
  } else {
    const all = loadReports();
    if (!all[featureId]) all[featureId] = [];
    all[featureId].push(entry);
    if (all[featureId].length > 50) all[featureId] = all[featureId].slice(-50);
    saveReports(all);
  }
}

function setOverride(featureId, status, note) {
  if (db) {
    const ref = db.collection('overrides').doc(featureId);
    if (status === null) { ref.delete(); }
    else { ref.set({ status, note: note || '', timestamp: new Date().toISOString() }); }
    // onSnapshot will update cachedOverrides and re-render
  } else {
    const all = loadOverrides();
    if (status === null) { delete all[featureId]; }
    else { all[featureId] = { status, note: note || '', timestamp: new Date().toISOString() }; }
    saveOverrides(all);
  }
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function timeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
  if (diff < 60)     return 'just now';
  if (diff < 3600)   return Math.round(diff/60) + 'm ago';
  if (diff < 86400)  return Math.round(diff/3600) + 'h ago';
  return Math.round(diff/86400) + 'd ago';
}

function toUKTime(isoStr) {
  if (!isoStr) return '';
  try {
    return new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Europe/London',
      hour: '2-digit', minute: '2-digit',
      timeZoneName: 'short',
    }).format(new Date(isoStr));
  } catch { return ''; }
}

function lastUpdatedStr(isoStr) {
  if (!isoStr) return '';
  return `${timeAgo(isoStr)} · ${toUKTime(isoStr)}`;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function findFeature(featureId) {
  for (const b of getAllBuildings()) {
    for (const f of b.features) {
      if (f.id === featureId) return { building: b, feature: f };
    }
  }
  return null;
}

// STATUS BADGE HTML
// ─────────────────────────────────────────────
function statusBadgeHtml(computed, small = true) {
  const s = STATUS_CFG[computed.status] || STATUS_CFG.working;
  const cls = `status-${s.cls}`;
  const confTag = computed.confidence && computed.confidence !== 'staff'
    ? `<span class="confidence-tag">${computed.confidence} conf.</span>` : '';
  const staffTag = computed.isOverride
    ? `<span class="confidence-tag">✓ Verified</span>` : '';
  const updated = computed.updatedAt
    ? `<span class="updated-tag" title="${esc(toUKTime(computed.updatedAt))}">Updated ${lastUpdatedStr(computed.updatedAt)}</span>` : '';
  const repCount = computed.reportCount > 0
    ? `<span class="report-count">${computed.reportCount} report${computed.reportCount !== 1 ? 's' : ''}</span>` : '';
  return `
    <span class="status-badge ${cls}" aria-label="Status: ${s.label}">
      <span class="status-dot" aria-hidden="true"></span>${esc(s.label)}
    </span>${confTag}${staffTag}${updated}${repCount}`;
}

// FEATURE ROW HTML
// ─────────────────────────────────────────────
function featureRowHtml(feature, buildingId) {
  const t = TYPES[feature.type] || { icon: '❓', label: feature.type };
  const computed = computeStatus(feature.id, feature.defaultStatus);
  const trackable = t.trackable && feature.defaultStatus !== 'unavailable';
  const chevron = trackable
    ? `<span class="feature-chevron" aria-hidden="true">›</span>`
    : '';
  // Whole row is a link to the feature subpage
  return `
    <a class="feature-row" href="#/feature/${esc(feature.id)}"
       id="feature-row-${esc(feature.id)}"
       data-type="${esc(feature.type)}" data-status="${esc(computed.status)}"
       aria-label="${esc(feature.name)}, ${esc(STATUS_CFG[computed.status]?.label || computed.status)}${computed.updatedAt ? ', updated ' + lastUpdatedStr(computed.updatedAt) : ''}">
      <div class="feature-icon" aria-hidden="true">${t.icon}</div>
      <div class="feature-body">
        <div class="feature-name">${esc(feature.name)}</div>
        <div class="feature-detail">${esc(feature.detail)}</div>
        ${feature.notes ? `<div class="feature-detail" style="font-style:italic;margin-top:2px">${esc(feature.notes)}</div>` : ''}
        <div class="feature-meta">${statusBadgeHtml(computed)}</div>
      </div>
      ${chevron}
    </a>`;
}

// ─────────────────────────────────────────────
// SUMMARY BAR
// ─────────────────────────────────────────────
function computeSummary(buildings) {
  let working = 0, partial = 0, broken = 0, unavail = 0;
  for (const b of buildings) {
    for (const f of b.features) {
      const c = computeStatus(f.id, f.defaultStatus);
      if (c.status === 'working') working++;
      else if (c.status === 'partial' || c.status === 'maintenance') partial++;
      else if (c.status === 'broken') broken++;
      else unavail++;
    }
  }
  return { working, partial, broken, unavail };
}

// ─────────────────────────────────────────────
// FILTER LOGIC
// ─────────────────────────────────────────────
function featureMatchesFilter(feature) {
  const computed = computeStatus(feature.id, feature.defaultStatus);
  if (currentFilter === 'all')     return true;
  if (currentFilter === 'broken')  return computed.status === 'broken';
  if (currentFilter === 'partial') return computed.status === 'partial' || computed.status === 'maintenance';
  return feature.type === currentFilter;
}

// ─────────────────────────────────────────────
// RENDER — BUILDINGS VIEW
// ─────────────────────────────────────────────
function renderBuildingsView(buildings) {
  const filtered = buildings.map(b => ({
    ...b,
    features: b.features.filter(featureMatchesFilter)
  })).filter(b => b.features.length > 0);

  if (!filtered.length) {
    return `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No features match this filter</div><div class="empty-sub">Try selecting a different filter above</div></div>`;
  }

  return filtered.map(b => {
    const broken  = b.features.filter(f => computeStatus(f.id, f.defaultStatus).status === 'broken').length;
    const partial = b.features.filter(f => { const s = computeStatus(f.id, f.defaultStatus).status; return s === 'partial' || s === 'maintenance'; }).length;
    const hasIssues = broken > 0 || partial > 0;
    const open = hasIssues || currentFilter !== 'all';
    const chips = [
      broken  ? `<span class="chip chip-broken">${broken} broken</span>`  : '',
      partial ? `<span class="chip chip-partial">${partial} partial</span>` : '',
    ].join('');
    return `
      <div class="building-card ${open ? 'open' : ''}" id="bld-${esc(b.id)}">
        <div class="building-header" onclick="toggleBuilding('${esc(b.id)}')" tabindex="0"
             role="button" aria-expanded="${open}" aria-controls="body-${esc(b.id)}"
             onkeydown="if(event.key==='Enter'||event.key===' '){toggleBuilding('${esc(b.id)}')}">
          <div class="building-name">${esc(b.name)}</div>
          <div class="building-chips">${chips}</div>
          <span class="chevron" aria-hidden="true">▼</span>
        </div>
        <div class="building-body" id="body-${esc(b.id)}">
          ${b.features.map(f => featureRowHtml(f, b.id)).join('')}
        </div>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// RENDER — TYPES VIEW
// ─────────────────────────────────────────────
function renderTypesView(buildings) {
  const allFeatures = [];
  for (const b of buildings) {
    for (const f of b.features) {
      if (featureMatchesFilter(f)) {
        allFeatures.push({ ...f, _buildingName: b.name, _buildingId: b.id });
      }
    }
  }

  const byType = {};
  for (const f of allFeatures) {
    if (!byType[f.type]) byType[f.type] = [];
    byType[f.type].push(f);
  }

  // Sort each type: broken first, then partial, then working
  const statusOrder = { broken: 0, maintenance: 1, partial: 1, working: 2, unavailable: 3 };
  for (const type of Object.keys(byType)) {
    byType[type].sort((a, b) => {
      const sa = statusOrder[computeStatus(a.id, a.defaultStatus).status] ?? 4;
      const sb = statusOrder[computeStatus(b.id, b.defaultStatus).status] ?? 4;
      return sa - sb;
    });
  }

  const typeOrder = ['lift','ramp','toilet','door','hearing','shower','wheelchair','steps','parking','intercom','keycard','tactile'];
  const orderedTypes = typeOrder.filter(t => byType[t]);
  const extraTypes = Object.keys(byType).filter(t => !typeOrder.includes(t));

  if (orderedTypes.length + extraTypes.length === 0) {
    return `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No features match this filter</div></div>`;
  }

  return [...orderedTypes, ...extraTypes].map(type => {
    const feats = byType[type];
    const t = TYPES[type] || { icon: '❓', label: type };
    return `
      <div class="type-section">
        <div class="type-section-header">
          <span class="type-section-icon" aria-hidden="true">${t.icon}</span>
          <span class="type-section-title">${esc(t.label)}</span>
          <span class="type-section-count">${feats.length} feature${feats.length !== 1 ? 's' : ''}</span>
        </div>
        ${feats.map(f => {
          const computed = computeStatus(f.id, f.defaultStatus);
          const trackable = (TYPES[f.type]?.trackable ?? false) && f.defaultStatus !== 'unavailable';
          const chevron = trackable ? `<span class="feature-chevron" aria-hidden="true">›</span>` : '';
          return `
            <a class="feature-row" href="#/feature/${esc(f.id)}"
               data-type="${esc(f.type)}" data-status="${esc(computed.status)}"
               aria-label="${esc(f.name)}, ${esc(f._buildingName)}, ${esc(STATUS_CFG[computed.status]?.label || computed.status)}${computed.updatedAt ? ', updated ' + lastUpdatedStr(computed.updatedAt) : ''}">
              <div class="feature-icon" aria-hidden="true">${t.icon}</div>
              <div class="feature-body">
                <div class="feature-name">${esc(f.name)}</div>
                <div class="feature-detail" style="color:var(--accent);font-size:11px;margin-bottom:2px">${esc(f._buildingName)}</div>
                <div class="feature-detail">${esc(f.detail)}</div>
                <div class="feature-meta">${statusBadgeHtml(computed)}</div>
              </div>
              ${chevron}
            </a>`;
        }).join('')}
      </div>`;
  }).join('');
}

function renderMain() {
  const buildings = getAllBuildings();
  const summary = computeSummary(buildings);
  const filterBtns = TRACKABLE_FILTERS.map(f =>
    `<button class="filter-btn ${currentFilter === f.id ? 'active' : ''}"
       onclick="setFilter('${f.id}')"
       aria-pressed="${currentFilter === f.id}">${esc(f.label)}</button>`
  ).join('');

  const content = currentView === 'buildings'
    ? renderBuildingsView(buildings)
    : renderTypesView(buildings);

  return `
    <header class="header" role="banner">
      <div class="header-top">
        <div class="header-logo" aria-hidden="true">${getLogo()}</div>
        <h1 class="header-title">Does It Work?</h1>
        <span class="header-badge">IC Campus</span>
      </div>
      <nav class="nav-tabs" role="tablist" aria-label="View">
        <button class="nav-tab" role="tab" aria-selected="${currentView === 'buildings'}"
          onclick="setView('buildings')">By Building</button>
        <button class="nav-tab" role="tab" aria-selected="${currentView === 'types'}"
          onclick="setView('types')">By Type</button>
      </nav>
    </header>
    <div class="filter-bar" role="toolbar" aria-label="Filter features">${filterBtns}</div>
    <div class="summary-bar" aria-live="polite" aria-label="Status summary">
      <span class="summary-pill pill-working">✅ ${summary.working} working</span>
      ${summary.partial ? `<span class="summary-pill pill-partial">⚠️ ${summary.partial} partial</span>` : ''}
      ${summary.broken  ? `<span class="summary-pill pill-broken">🔴 ${summary.broken} broken</span>`  : ''}
      ${summary.unavail ? `<span class="summary-pill pill-unavail">⬜ ${summary.unavail} unavailable</span>` : ''}
      ${db
        ? `<span class="summary-pill" style="background:rgba(48,209,88,.12);color:#30d158" title="Live sync active">🔴 Live</span>`
        : `<span class="summary-pill" style="background:var(--unavail-bg);color:var(--unavail)" title="Offline — reports stored locally">📴 Local</span>`

    <button class="fab" onclick="route('#/admin')" aria-label="Admin: import CSV data" title="Import CSV data">⚙️</button>
  `;
}

      <div class="empty-state"><div class="empty-icon">❓</div><div class="empty-text">Feature not found</div><div class="empty-sub">ID: ${esc(featureId)}</div></div></div>`;
  }
  const { building, feature } = result;
  const t = TYPES[feature.type] || { icon: '❓', label: feature.type };
  const computed = computeStatus(featureId, feature.defaultStatus);
  const s = STATUS_CFG[computed.status] || STATUS_CFG.working;
  const trackable = (TYPES[feature.type]?.trackable ?? false) && feature.defaultStatus !== 'unavailable';
  const qrBadge = source === 'qr' ? `<div class="staff-badge" style="margin-bottom:12px">📱 Scanned via QR code</div>` : '';

            </label>

            <label for="${uid}-p" class="report-radio-label report-lbl-partial">
              <span class="status-option-icon" aria-hidden="true">⚠️</span>Partial
            </label>
            <input type="radio" name="${uid}" id="${uid}-b" value="broken" class="report-radio-input">

              <span class="status-option-icon" aria-hidden="true">🔴</span>Broken
            </label>
          </div>
        </fieldset>
        <label class="qr-note-label" for="fp-note">Add a note <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
        <textarea id="fp-note" name="note" class="note-input" rows="2"

    ? `<a class="qr-source" href="${esc(feature.sourceUrl)}" target="_blank" rel="noopener">🔗 Full AccessAble guide</a>` : '';

            ? `<span>Last updated: <strong>${lastUpdatedStr(computed.updatedAt)}</strong></span>`
            : '<span>No reports yet — be the first!</span>'}

function renderModal() {
  if (!modalState) return '';
  const { featureId, buildingId } = modalState;
  const result = findFeature(featureId);
  if (!result) return '';
  const { feature } = result;
  const computed = computeStatus(featureId, feature.defaultStatus);
  const t = TYPES[feature.type] || { icon: '❓', label: '' };
  const opts = [
    { s: 'working', icon: '✅', label: 'Working' },
    { s: 'partial',  icon: '⚠️', label: 'Partial' },
    { s: 'broken',   icon: '🔴', label: 'Broken'  },
  ];
  const sel = modalState.selectedStatus || computed.status;

  return `
    <div class="overlay open" role="dialog" aria-modal="true" aria-labelledby="modal-title"
         onclick="if(event.target===this)closeModal()">
      <div class="sheet">
        <div class="sheet-handle" aria-hidden="true"></div>

        <p class="sheet-subtitle">${esc(result.building.name)}</p>
        <div class="status-grid" role="group" aria-label="Select status">
          ${opts.map(o => `

                 onkeydown="if(event.key==='Enter'||event.key===' ')selectStatus('${o.s}')">

}

        <h1 class="qrs-title">Does it work?</h1>
        <div class="qrs-feature-info">
          <span class="qrs-icon" aria-hidden="true">${t.icon}</span>
          <span>${esc(feature.name)}</span>
        </div>
        ${currentStatus}
        <div class="answer-row" role="group" aria-label="Is this feature working?">
          <button class="answer-btn ${sel === 'yes' ? 'sel-yes' : ''}"
            onclick="selectAnswer('yes')"
            aria-pressed="${sel === 'yes'}"
            aria-label="Yes, it is working">
            <span class="ab-icon" aria-hidden="true">✅</span>
            Yes
          </button>
          <button class="answer-btn ${sel === 'no' ? 'sel-no' : ''}"
            onclick="selectAnswer('no')"
            aria-pressed="${sel === 'no'}"
            aria-label="No, it is not working">
            <span class="ab-icon" aria-hidden="true">❌</span>
            No
          </button>
        </div>
        <div class="qrs-note-wrap">
          <label class="qrs-note-label" for="qr-note">Add a note <span style="font-weight:400;color:var(--text-3)">(optional)</span></label>
          <textarea id="qr-note" class="note-input" rows="2"
            placeholder="e.g. lift door stuck, button unresponsive…"
            aria-label="Optional note about this feature"></textarea>
        </div>
        <button class="qrs-confirm" ${canSubmit ? '' : 'disabled'}
          onclick="${canSubmit ? `submitQRReport('${esc(featureId)}')` : ''}"
          aria-disabled="${!canSubmit}">
          Confirm
        </button>
      </div>
      <div class="qrs-footer">
        <div class="qrs-footer-loc">
          <strong>${t.icon} ${esc(feature.name)}</strong>
          📍 ${esc(building.name)} · Floor ${esc(feature.floor)}
        </div>
        <button class="qrs-choose" onclick="route('#/')" aria-label="Choose a different feature on the main page">
          Choose a different feature →
        </button>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// RENDER — QR CODE GENERATOR PAGE
// ─────────────────────────────────────────────
function renderQRCodePage(featureId) {
  const result = findFeature(featureId);
  const label = result
    ? `${result.building.name} — ${result.feature.name}`
    : featureId;
  const icon = result ? (TYPES[result.feature.type]?.icon || '♿') : '♿';
  const floor = result ? result.feature.floor : '';
  const targetUrl = window.location.href.replace(/#.*$/, '') + '#/feature/' + encodeURIComponent(featureId) + '?source=qr';

  return `
    <div class="qrp-page">
      <div class="qrp-header">
        <button class="qrs-back" onclick="history.back()" aria-label="Go back">← Back</button>
        <span style="font-size:15px;font-weight:700">QR Code</span>
      </div>
      <div class="qrp-body">
        <div class="qrp-card">
          <div class="qrp-icon-row" aria-hidden="true">${icon}</div>
          <div id="qr-canvas" aria-label="QR code for ${esc(label)}"></div>
          <div class="qrp-label">${esc(label)}</div>
          ${floor && floor !== '—' ? `<div class="qrp-sublabel">Floor ${esc(floor)}</div>` : ''}
          <div class="qrp-sublabel" style="margin-top:4px">Scan to report if it's working</div>
        </div>
        <p class="qrp-url">${esc(targetUrl)}</p>
        <div class="qrp-actions">
          <button class="btn-print" onclick="window.print()">🖨 Print QR code</button>
          <button class="btn-clear" onclick="navigator.clipboard?.writeText('${esc(targetUrl)}').then(()=>showToast('✅ URL copied!'))">📋 Copy link</button>
        </div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// ROUTING
// ─────────────────────────────────────────────
function getRoute() {
  const hash = location.hash || '#/';
  const hashQuery = hash.includes('?') ? hash.split('?')[1] : '';
  const params = new URLSearchParams(hashQuery);
  if (hash.startsWith('#/qr/')) {
    const featureId = hash.slice('#/qr/'.length).split('?')[0];
    return { page: 'qrcode', featureId };
  }
  if (hash.startsWith('#/feature/')) {
    const featureId = hash.slice('#/feature/'.length).split('?')[0];
    const source = params.get('source');
    return { page: 'feature', featureId, source };
  }
  if (hash.startsWith('#/admin')) return { page: 'admin' };
  return { page: 'main' };
}

function route(hash) {
  location.hash = hash;
}

function renderApp() {
  const r = getRoute();
  const app = document.getElementById('app');
  if (r.page === 'qrcode') {
    app.innerHTML = renderQRCodePage(r.featureId);
    // Initialise QR code after DOM is ready
    setTimeout(() => {
      const el = document.getElementById('qr-canvas');
      if (el && window.QRCode) {
        const url = window.location.href.replace(/#.*$/, '') + '#/feature/' + encodeURIComponent(r.featureId) + '?source=qr';
        new QRCode(el, { text: url, width: 260, height: 260, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
      }
    }, 0);
  } else if (r.page === 'feature') {
    if (r.source === 'qr') {
      app.innerHTML = renderQRLanding(r.featureId);
    } else {
      app.innerHTML = renderFeaturePage(r.featureId, r.source) + renderModal();
    }
  } else if (r.page === 'admin') {
    app.innerHTML = renderAdminPage() + renderModal();
  } else {
    app.innerHTML = renderMain() + renderModal();
  }
  // Restore focus if modal open
  if (modalState) {
    const note = document.getElementById('modal-note');
    if (note && document.activeElement !== note) note.focus();
  }
}

// ─────────────────────────────────────────────
// EVENT HANDLERS
// ─────────────────────────────────────────────
function toggleBuilding(id) {
  const card = document.getElementById('bld-' + id);
  if (card) {
    card.classList.toggle('open');
    const btn = card.querySelector('.building-header');
    if (btn) btn.setAttribute('aria-expanded', card.classList.contains('open'));
  }
}

function setFilter(f) {
  currentFilter = f;
  renderApp();
}

function setView(v) {
  currentView = v;
  renderApp();
}

function openModal(featureId, buildingId) {
  const computed = computeStatus(featureId, '');
  modalState = { featureId, buildingId, selectedStatus: computed.status, note: '' };
  renderApp();
  // Focus first status option
  setTimeout(() => {
    const first = document.querySelector('.status-option');
    if (first) first.focus();
  }, 100);
}

function closeModal() {
  modalState = null;
  renderApp();
}

function selectStatus(s) {
  if (modalState) {
    modalState.selectedStatus = s;
    modalState.note = document.getElementById('modal-note')?.value || '';
    renderApp();
  }
}

function saveStatus() {
  if (!modalState) return;
  const note = document.getElementById('modal-note')?.value || '';
  addReport(modalState.featureId, modalState.selectedStatus, note, 'web');
  modalState = null;
  renderApp();
  showToast('✅ Status reported — thanks!');
}

function qrReport(featureId, status) {
  const note = document.getElementById('qr-note')?.value || '';
  addReport(featureId, status, note, 'qr');
  showToast('✅ Thanks for your report!');
  renderApp();
}

function submitFeatureForm(event, featureId) {
  event.preventDefault();
  const form = event.target;
  const status = form.querySelector('input[type=radio]:checked')?.value;
  if (!status) { showToast('Please select a status first'); return false; }
  const note = form.querySelector('textarea[name=note]')?.value || '';
  addReport(featureId, status, note, 'web');
  showToast('✅ Status reported — thanks!');
  renderApp();
  return false;
}

function selectAnswer(answer) {
  // Preserve the note text before re-rendering
  const noteVal = document.getElementById('qr-note')?.value || '';
  qrLanding.selectedAnswer = answer;
  renderApp();
  // Restore note text (input is recreated by innerHTML)
  const noteEl = document.getElementById('qr-note');
  if (noteEl) noteEl.value = noteVal;
}

function submitQRReport(featureId) {
  const note = document.getElementById('qr-note')?.value || '';
  const status = qrLanding.selectedAnswer === 'yes' ? 'working' : 'broken';
  addReport(featureId, status, note, 'qr');
  qrLanding.submitted = true;
  renderApp();
}

function resetQRLanding() {
  qrLanding = { selectedAnswer: null, submitted: false };
}

// ─────────────────────────────────────────────
// CSV / TSV PARSER
// ─────────────────────────────────────────────
const TYPE_MAP = {
  'lift': 'lift',
  'ramp': 'ramp',
  'steps': 'steps',
  'automatic door': 'door',
  'manual door': 'door',
  'accessible toilet': 'toilet',
  'accessible toilet (none available)': 'toilet',
  'hearing loop': 'hearing',
  'wheelchair space': 'wheelchair',
  'intercom': 'intercom',
  'keycard reader': 'keycard',
  'tactile paving': 'tactile',
  'accessible shower': 'shower',
  'parking': 'parking',
  'blue badge': 'parking',
};

const STATUS_MAP = {
  'operational': 'working',
  'out of service': 'broken',
  'not available': 'unavailable',
  'working': 'working',
  'broken': 'broken',
  'partial': 'partial',
  'maintenance': 'maintenance',
};

function parseDelimited(text) {
  // Auto-detect delimiter
  const firstLine = text.split('\n')[0];
  const tabCount   = (firstLine.match(/\t/g) || []).length;
  const commaCount = (firstLine.match(/,/g) || []).length;
  const sep = tabCount >= commaCount ? '\t' : ',';

  const lines = text.split('\n').map(l => l.trimEnd());
  const errors = [];
  const buildingMap = {};

  // Skip header row
  const dataLines = lines.slice(1).filter(l => l.trim());

  for (let i = 0; i < dataLines.length; i++) {
    const cols = sep === '\t'
      ? dataLines[i].split('\t')
      : parseCSVLine(dataLines[i]);

    if (cols.length < 4) {
      errors.push(`Row ${i+2}: too few columns (${cols.length})`);
      continue;
    }

    const [fixtureId, buildingName, zone, fixtureType, subtype, locationDetail,
           floor, accessType, dimensions, notes, conditionRaw, sourceUrl] = cols.map(c => (c || '').trim());

    if (!fixtureId || !buildingName || !fixtureType) {
      errors.push(`Row ${i+2}: missing required fields`);
      continue;
    }

    const typeKey = (fixtureType || '').toLowerCase();
    const mappedType = TYPE_MAP[typeKey] ||
      Object.entries(TYPE_MAP).find(([k]) => typeKey.includes(k))?.[1] ||
      'door';

    const conditionKey = (conditionRaw || '').toLowerCase();
    const mappedStatus = STATUS_MAP[conditionKey] || 'working';

    // Build feature name: subtype + zone
    const nameBase = subtype || fixtureType;
    const nameSuffix = zone ? ` — ${zone}` : (locationDetail ? ` — ${locationDetail}` : '');
    const featureName = nameBase + nameSuffix;

    // Detail: location + floor
    const detailParts = [locationDetail, floor ? `Floor ${floor}` : '', dimensions].filter(Boolean);
    const detail = detailParts.join('; ');

    const notesText = [accessType, notes].filter(Boolean).join('. ');

    const buildingSlug = toSlug(buildingName);
    if (!buildingMap[buildingSlug]) {
      buildingMap[buildingSlug] = { id: buildingSlug, name: buildingName, features: [] };
    }

    // Avoid duplicate IDs
    if (!buildingMap[buildingSlug].features.find(f => f.id === fixtureId)) {
      buildingMap[buildingSlug].features.push({
        id: fixtureId,
        type: mappedType,
        name: featureName,
        detail: detail || locationDetail || 'No detail available',
        floor: floor || '—',
        notes: notesText,
        defaultStatus: mappedStatus,
        sourceUrl: sourceUrl || '',
      });
    }
  }

  const buildings = Object.values(buildingMap);
  const totalRows = buildings.reduce((n, b) => n + b.features.length, 0);
  return { buildings, totalRows, errors };
}

function parseCSVLine(line) {
  const cols = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      cols.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  cols.push(cur);
  return cols;
}

function handleLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    saveLogo(ev.target.result);
    // Update preview immediately without full re-render
    const preview = document.getElementById('logo-preview');
    if (preview) preview.innerHTML = getLogo();
    // Refresh header logo
    renderApp();
    showToast('✅ Logo saved');
  };
  reader.readAsDataURL(file);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone')?.classList.add('dragover');
}
function handleDragLeave(e) {
  document.getElementById('drop-zone')?.classList.remove('dragover');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone')?.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}
function handleFileInput(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    let text = e.target.result;
    // Fix common Windows-1252 / Mac encoding artefacts
    text = text
      .replace(/√©/g, 'é').replace(/√†/g, 'à').replace(/√ü/g, 'ü')
      .replace(/‚Äî/g, '—').replace(/‚Äì/g, '–')
      .replace(/‚Äù/g, '"').replace(/‚Äú/g, '"')
      .replace(/‚Äô/g, "'").replace(/â€™/g, "'");
    importPreview = parseDelimited(text);
    renderApp();
  };
  reader.readAsText(file);
}

function commitImport() {
  if (!importPreview) return;
  const existing = loadImported();
  const merged = [...existing];
  for (const b of importPreview.buildings) {
    const idx = merged.findIndex(x => x.id === b.id);
    if (idx >= 0) {
      const existIds = new Set(merged[idx].features.map(f => f.id));
      for (const f of b.features) {
        if (!existIds.has(f.id)) merged[idx].features.push(f);
      }
    } else {
      merged.push(b);
    }
  }
  saveImported(merged);
  importPreview = null;
  showToast(`✅ Imported ${merged.reduce((n,b)=>n+b.features.length,0)} features`);
  renderApp();
}

function clearPreview() {
  importPreview = null;
  renderApp();
}

function clearImported() {
  if (confirm('Clear all imported data? Seed data will remain.')) {
    localStorage.removeItem(LS_IMPORTED);
    renderApp();
  }
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'success-toast';
  t.textContent = msg;
  t.setAttribute('role', 'status');
  t.setAttribute('aria-live', 'polite');
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('hashchange', () => {
  importPreview = null;
  qrLanding = { selectedAnswer: null, submitted: false };
  renderApp();
});

initFirebase();
renderApp();
